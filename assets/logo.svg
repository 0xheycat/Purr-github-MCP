<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-label="Purr GitHub MCP">
  <defs>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF2EA6"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#181019"/>
      <stop offset="1" stop-color="#0B0B0F"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#FF2EA6" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1200" height="320" rx="44" fill="url(#tile)" stroke="#241826" stroke-width="2"/>
  <g transform="translate(170,158)" filter="url(#soft)">
    <g stroke="url(#mark)" stroke-width="16" fill="none" stroke-linecap="round">
      <path d="M0 74 L0 -26"/>
      <path d="M0 4 C0 -42 62 -30 62 -74"/>
    </g>
    <circle cx="0" cy="82" r="21" fill="url(#mark)"/>
    <circle cx="0" cy="-30" r="21" fill="url(#mark)"/>
    <circle cx="62" cy="-78" r="21" fill="url(#mark)"/>
    <circle cx="-46" cy="-58" r="9" fill="#FF7ACF"/>
    <circle cx="-22" cy="-78" r="9" fill="#FF7ACF"/>
  </g>
  <text x="330" y="150" fill="#FFFFFF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="82" font-weight="800" letter-spacing="-2">Purr GitHub</text>
  <text x="333" y="212" fill="#B9A9C6" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="500">Self-hosted GitHub MCP server for agents</text>
  <g transform="translate(1000 78)">
    <rect width="132" height="58" rx="29" fill="#241826" stroke="#3a2b40"/>
    <text x="66" y="38" text-anchor="middle" fill="#FF7ACF" font-family="Inter, sans-serif" font-size="25" font-weight="800" letter-spacing="1.5">MCP</text>
